name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  agent:
    name: Agent (Python + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: uv run pytest -q
        env:
          # Defaults seguros pra config Pydantic nao explodir nos testes que
          # nao precisam de credenciais reais (a maioria usa respx/mocks).
          OPENROUTER_API_KEY: dummy
          SERPAPI_API_KEY: dummy
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: dummy

  frontend:
    name: Frontend (Vite + ESLint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (tsc + vite)
        run: npm run build
